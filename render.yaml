services:
  - type: web
    name: systematic-review-app
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --prefix backend && npm run build --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: node backend/dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: sra-data
      mountPath: /var/data
      sizeGB: 1
